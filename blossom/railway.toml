[build]
buildCommand = nullbuilder = "DOCKERFILE"
dockerfilePath = "/blossom/Dockerfile"
watchPatterns = [
  "blossom/**",
  "packages/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
]

[deploy]
startCommand = null
healthcheckPath = "/healthz"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
