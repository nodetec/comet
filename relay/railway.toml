[build]
builder = "DOCKERFILE"
buildCommand = null
dockerfilePath = "/relay/Dockerfile"
watchPatterns = [
  "relay/**",
  "packages/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
]

[deploy]
startCommand = null
healthcheckPath = "/healthz"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
