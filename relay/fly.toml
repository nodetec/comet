# Change `app` before first deploy if you need a different globally unique Fly app name.
app = "comet-relay"
primary_region = "ewr"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "relay/Dockerfile"
  ignorefile = "relay/.dockerignore"

[env]
  PORT = "3000"
  PRIVATE_MODE = "true"
  RELAY_URL = "wss://relay.comet.md"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
