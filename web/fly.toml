app = "comet-web"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    VITE_RELAY_URL = "wss://relay.comet.md"
    VITE_BLOSSOM_URL = "https://comet-blossom.fly.dev"

[env]
  NITRO_PORT = "3100"
  NITRO_HOST = "0.0.0.0"
  PORT = "3100"
  HOST = "0.0.0.0"
  RELAY_URL = "http://comet-relay.internal:3000"
  BLOSSOM_URL = "http://comet-blossom.internal:3000"

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/admin/login"
  timeout = "5s"
