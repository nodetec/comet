name: Relay Deploy

on:
  push:
    branches: [master]
    paths:
      - relay/src/**
      - relay/drizzle/**
      - relay/package.json
      - relay/Dockerfile
      - relay/.dockerignore
      - relay/fly.toml
      - .github/workflows/relay-deploy.yml
  workflow_dispatch:

concurrency:
  group: relay-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy relay
        run: flyctl deploy --config relay/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
